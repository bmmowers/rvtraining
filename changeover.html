<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Changeover Log">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Changeover Sanitation Log</title>

  <!-- Swap this for a custom icon if you make one -->
  <link rel="apple-touch-icon" href="empire_valley_logo.png">
  <link rel="icon" type="image/png" href="empire_valley_logo.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --ev-green: #1B5E3B;
      --ev-green-dark: #14442B;
      --ev-green-deep: #0E3320;
      --ev-cream: #F5F0E8;
      --ev-cream-light: #FAF7F2;
      --ev-gold: #B8A472;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--ev-cream);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 40px 24px;
      background: var(--ev-cream);
      position: relative;
    }

    /* Subtle green top accent line */
    .container::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--ev-green), transparent);
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      margin-bottom: 40px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-img {
      width: 140px;
      height: auto;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.08));
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: var(--ev-green-dark);
      letter-spacing: -0.3px;
      line-height: 1.15;
      text-align: center;
    }

    h1 span {
      color: var(--ev-green);
      display: block;
      font-weight: 700;
    }

    .subtitle {
      font-size: 14px;
      color: rgba(27, 94, 59, 0.6);
      letter-spacing: 0.3px;
      text-align: center;
    }

    .action-btn {
      margin-top: 40px;
      padding: 20px 48px;
      background: var(--ev-green);
      border: 2px solid var(--ev-green-dark);
      border-radius: 14px;
      color: var(--ev-cream);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(20, 68, 43, 0.25);
      text-align: center;
      animation: fadeIn 0.8s ease 0.2s both;
    }

    .action-btn:active {
      transform: scale(0.97);
      background: var(--ev-green-deep);
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--ev-gold), transparent);
      margin-top: 12px;
    }

    .footer {
      position: fixed;
      bottom: 24px;
      font-size: 11px;
      color: rgba(27, 94, 59, 0.4);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo-wrap">
      <img src="empire_valley_logo.png" alt="Empire Valley" class="logo-img">
      <div class="divider"></div>
      <h1>Changeover<span>Sanitation Log</span></h1>
      <div class="subtitle">Tap below to log a product changeover</div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════
         REPLACE THE URL BELOW WITH YOUR MS FORMS RESPONDER LINK
         ═══════════════════════════════════════════════════════════ -->
    <a class="action-btn" href="https://forms.office.com/r/Cv0cpvH3vq">
      🧹 &nbsp;Log Changeover
    </a>

    <div class="footer">Production Room</div>

  </div>
</body>
</html>
