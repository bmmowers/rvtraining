<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <title>Toolbox Talks - Lead Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface-hover: #22223a;
      --text: #e8e8f0;
      --text-muted: #8888a0;
      --amber: #f39c12;
      --radius: 14px;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .page-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .page-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    /* Random button */
    .random-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--amber), #e67e22);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-bottom: 24px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s ease;
    }
    .random-btn:active { transform: scale(0.97); }
    .random-btn .dice { font-size: 22px; }

    /* Category filter pills */
    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .pill {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.15s ease;
    }
    .pill.active {
      background: var(--amber);
      color: #fff;
      border-color: var(--amber);
    }

    /* Talk list */
    .talk-list { list-style: none; }
    .talk-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 10px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.12s ease, background 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .talk-item:active {
      transform: scale(0.98);
      background: var(--surface-hover);
    }
    .talk-icon { font-size: 24px; flex-shrink: 0; }
    .talk-info { flex: 1; min-width: 0; }
    .talk-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
    }
    .talk-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .talk-arrow {
      color: var(--text-muted);
      font-size: 18px;
      flex-shrink: 0;
    }
    .empty-msg {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Category colors */
    .cat-safety   { color: #e74c3c; }
    .cat-gmp      { color: #27ae60; }
    .cat-quality   { color: #3498db; }
    .cat-equipment { color: #95a5a6; }
    .cat-allergens { color: #e67e22; }
    .cat-hr        { color: #9b59b6; }
  </style>
</head>
<body>

  <a class="back-link" href="../index.html">&larr; Back to Hub</a>
  <div class="page-title">Toolbox Talks</div>
  <p class="page-sub">Pick a topic or tap Random for a surprise.</p>

  <button class="random-btn" id="randomBtn">
    <span class="dice">🎲</span> Random Topic
  </button>

  <div class="filter-row" id="filterRow">
    <span class="pill active" data-cat="all">All</span>
    <span class="pill" data-cat="Safety">🛡 Safety</span>
    <span class="pill" data-cat="GMP">📋 GMP</span>
    <span class="pill" data-cat="Quality">🔍 Quality</span>
    <span class="pill" data-cat="Equipment">🔧 Equipment</span>
    <span class="pill" data-cat="Allergens">⚠️ Allergens</span>
    <span class="pill" data-cat="HR/Policy">👥 HR/Policy</span>
  </div>

  <ul class="talk-list" id="talkList"></ul>

  <script>
    // ── Category icon map ──
    const catIcons = {
      'Safety': '🛡',
      'GMP': '📋',
      'Quality': '🔍',
      'Equipment': '🔧',
      'Allergens': '⚠️',
      'HR/Policy': '👥'
    };
    const catClass = {
      'Safety': 'cat-safety',
      'GMP': 'cat-gmp',
      'Quality': 'cat-quality',
      'Equipment': 'cat-equipment',
      'Allergens': 'cat-allergens',
      'HR/Policy': 'cat-hr'
    };

    let talks = [];
    let activeCategory = 'all';

    // ── Load talks index ──
    fetch('talks.json')
      .then(r => r.json())
      .then(data => {
        talks = data;
        renderList();
      })
      .catch(() => {
        document.getElementById('talkList').innerHTML =
          '<div class="empty-msg">Could not load talks. Check that talks.json exists.</div>';
      });

    // ── Render talk list ──
    function renderList() {
      const filtered = activeCategory === 'all'
        ? talks
        : talks.filter(t => t.category === activeCategory);

      const list = document.getElementById('talkList');
      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty-msg">No talks in this category yet.</div>';
        return;
      }
      list.innerHTML = filtered.map(t => `
        <a class="talk-item" href="${t.file}">
          <span class="talk-icon">${catIcons[t.category] || '📄'}</span>
          <div class="talk-info">
            <div class="talk-title">${t.title}</div>
            <div class="talk-meta"><span class="${catClass[t.category] || ''}">${t.category}</span> &middot; ${t.estimatedMinutes || 3} min</div>
          </div>
          <span class="talk-arrow">&rsaquo;</span>
        </a>
      `).join('');
    }

    // ── Filter pills ──
    document.getElementById('filterRow').addEventListener('click', (e) => {
      const pill = e.target.closest('.pill');
      if (!pill) return;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      activeCategory = pill.dataset.cat;
      renderList();
    });

    // ── Random topic ──
    document.getElementById('randomBtn').addEventListener('click', () => {
      const pool = activeCategory === 'all'
        ? talks
        : talks.filter(t => t.category === activeCategory);
      if (pool.length === 0) return;
      const pick = pool[Math.floor(Math.random() * pool.length)];
      window.location.href = pick.file;
    });
  </script>

</body>
</html>
